version: "2"
sql:
  - schema: "internal/repo/schema"
    queries: "internal/repo/query"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "internal/repo/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamp"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
